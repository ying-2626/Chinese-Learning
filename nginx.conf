# 前后端分离项目Nginx配置示例
server {
    server_name shengdonghanyu.com www.shengdonghanyu.com;

    root /usr/share/nginx/html;
    index index.html index.htm index.php;

    # 博信息别单博信息/API 姓吏日期吏日期
    location ~ ^/(api|scoreAction|user)/ {
        proxy_pass http://localhost:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 音频文件访问
    location /audios/ {
        alias /www/wwwroot/web/audios/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/shengdonghanyu.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/shengdonghanyu.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP重定向到HTTPS
server {
    if ($host = www.shengdonghanyu.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = shengdonghanyu.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name shengdonghanyu.com www.shengdonghanyu.com;
    return 404;
}